name: techworkhub
version: '3.8'

services:

  backend:
    image: ghcr.io/developerazadpro/techworkhub-backend:latest
    container_name: techworkhub-backend
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: techworkhub
      DB_USERNAME: root       # use secrets in prod
      DB_PASSWORD: root       # use secrets in prod
      GO_MATCHING_SERVICE_URL: http://go-service:8081
    depends_on:
      - mysql
      - go-service
    ports:
      - "8000:8000"   # optional; usually nginx reverse proxy

  frontend:
    image: ghcr.io/developerazadpro/techworkhub-frontend:latest
    container_name: techworkhub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  go-service:
    image: ghcr.io/developerazadpro/techworkhub-go:latest
    container_name: techworkhub-go
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: techworkhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: techworkhub
      MYSQL_ROOT_PASSWORD: <secure_password>
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: