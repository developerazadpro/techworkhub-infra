name: techworkhub
version: '3.8'

services:

  backend:
    build:
      context: ../techworkhub-backend
      dockerfile: Dockerfile
    container_name: techworkhub-backend
    working_dir: /var/www
    volumes:
      - ../techworkhub-backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - go-service
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: techworkhub
      DB_USERNAME: root
      DB_PASSWORD: root
      GO_MATCHING_SERVICE_URL: http://go-service:8081
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    build:
      context: ../techworkhub-frontend
      dockerfile: Dockerfile.dev
    container_name: techworkhub-frontend
    working_dir: /app
    volumes:
      - ../techworkhub-frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
    depends_on:
      - backend

  go-service:
    build:
      context: ../techworkhub-go
      dockerfile: Dockerfile
    container_name: techworkhub-go
    working_dir: /app
    ports:
      - "8081:8081"

  mysql:
    image: mysql:8
    container_name: techworkhub-mysql
    environment:
      MYSQL_DATABASE: techworkhub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: techworkhub-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data: